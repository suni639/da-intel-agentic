name: Digital Asset Intelligence Engine Scheduled Run

on:
  schedule:
    # Run every Monday at 02:00 UTC (03:00 AM UK time during BST, 02:00 AM UK time during GMT)
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # Allows manual execution from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-repo

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          path: main-repo
          # Fetch all history so git push works cleanly
          fetch-depth: 0

      - name: Checkout Hugo repository
        uses: actions/checkout@v4
        with:
          repository: suni639/sunilkandola-hugo
          path: sunilkandola-hugo
          token: ${{ secrets.HUGO_REPO_PAT }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: main-repo/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-genai markdown

      - name: Check repository secrets
        run: |
          echo "Checking if secrets are populated (true/false):"
          echo "GEMINI_API_KEY is set: ${{ secrets.GEMINI_API_KEY != '' }}"
          echo "SMTP_USER is set: ${{ secrets.SMTP_USER != '' }}"
          echo "SMTP_PASS is set: ${{ secrets.SMTP_PASS != '' }}"
          echo "RECIPIENT_EMAIL is set: ${{ secrets.RECIPIENT_EMAIL != '' }}"
          echo "HUGO_REPO_PAT is set: ${{ secrets.HUGO_REPO_PAT != '' }}"

      - name: Run intelligence engine pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python pipeline/run_pipeline.py 2>&1 | tee pipeline_output.log

      - name: Commit and push updated system state
        run: |
          # Commit and push only if system_state.json exists and has changes
          if [ -f system_state.json ]; then
            echo "system_state.json found. Staging..."
            # Use force add because system_state.json is listed in .gitignore
            git add --force system_state.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update system state [skip ci]"
              git push origin HEAD:main
            else
              echo "No changes to commit in system_state.json"
            fi
          else
            echo "system_state.json does not exist. Skipping commit."
          fi

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            main-repo/pipeline_output.log
            main-repo/error_log.txt
